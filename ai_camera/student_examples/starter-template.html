<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Camera - Starter Template</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        h2 { color: #666; font-size: 1.2rem; margin-bottom: 15px; }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-purple { background: #9b59b6; color: white; }
        button:hover { opacity: 0.9; }
        input {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 300px;
        }
        #result {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            min-height: 100px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.9rem;
        }
        #snapshot {
            max-width: 100%;
            border-radius: 8px;
            display: none;
            margin-top: 15px;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>AI Camera - Starter Template</h1>
    <p>Use this template as a starting point for your own projects!</p>

    <!-- CONNECTION -->
    <div class="card">
        <h2>1. Connect to Camera</h2>
        <input type="text" id="cameraIP" value="ai-camera.local" placeholder="Camera IP or hostname">
        <button class="btn-blue" onclick="testConnection()">Test Connection</button>
        <div id="connectionResult" class="status info">Enter camera IP and click Test</div>
    </div>

    <!-- CAPTURE -->
    <div class="card">
        <h2>2. Capture Image</h2>
        <button class="btn-green" onclick="captureImage()">Take Photo</button>
        <button class="btn-blue" onclick="showLatestImage()">Show Latest</button>
        <img id="snapshot" alt="Camera snapshot">
    </div>

    <!-- AUDIO -->
    <div class="card">
        <h2>3. Record Audio</h2>
        <button class="btn-red" onclick="recordAudio(3)">Record 3 sec</button>
        <button class="btn-red" onclick="recordAudio(5)">Record 5 sec</button>
        <button class="btn-red" onclick="recordAudio(10)">Record 10 sec</button>
    </div>

    <!-- AI ANALYSIS -->
    <div class="card">
        <h2>4. Ask AI</h2>
        <p>Capture an image and record audio first, then click Analyze:</p>
        <button class="btn-purple" onclick="analyzeWithAI()">Analyze with AI</button>
        <button class="btn-blue" onclick="checkProgress()">Check Progress</button>
    </div>

    <!-- RESULTS -->
    <div class="card">
        <h2>Results</h2>
        <div id="result">Results will appear here...</div>
    </div>

    <script>
        // ============================================================
        // CAMERA URL HELPER
        // ============================================================
        function getCameraURL() {
            const ip = document.getElementById('cameraIP').value.trim();
            if (!ip.startsWith('http://')) return `http://${ip}`;
            return ip;
        }

        function showResult(message, type = 'info') {
            const resultEl = document.getElementById('result');
            resultEl.textContent = message;

            const statusEl = document.getElementById('connectionResult');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message.split('\n')[0]; // First line only
        }

        // ============================================================
        // TEST CONNECTION
        // ============================================================
        async function testConnection() {
            showResult('Testing connection...', 'info');
            try {
                const res = await fetch(`${getCameraURL()}/device-info`);
                const data = await res.json();
                showResult(`Connected!\nIP: ${data.ip}\nmDNS: ${data.mdns}\nSignal: ${data.rssi} dBm`, 'success');
            } catch (err) {
                showResult(`Connection failed: ${err.message}`, 'error');
            }
        }

        // ============================================================
        // CAPTURE IMAGE
        // ============================================================
        async function captureImage() {
            showResult('Capturing image...', 'info');
            try {
                const res = await fetch(`${getCameraURL()}/capture`);
                const data = await res.json();
                if (data.success) {
                    showResult(`Image captured: ${data.filename}`, 'success');
                    showLatestImage();
                } else {
                    showResult('Capture failed', 'error');
                }
            } catch (err) {
                showResult(`Error: ${err.message}`, 'error');
            }
        }

        function showLatestImage() {
            const img = document.getElementById('snapshot');
            img.src = `${getCameraURL()}/image/latest?t=${Date.now()}`;
            img.style.display = 'block';
        }

        // ============================================================
        // RECORD AUDIO
        // ============================================================
        async function recordAudio(duration) {
            showResult(`Recording ${duration} seconds of audio...`, 'info');
            try {
                const res = await fetch(`${getCameraURL()}/audio/record?duration=${duration}`, {
                    signal: AbortSignal.timeout((duration + 10) * 1000)
                });
                const data = await res.json();
                if (data.success) {
                    showResult(`Audio recorded: ${data.filename}`, 'success');
                } else {
                    showResult('Recording failed', 'error');
                }
            } catch (err) {
                showResult(`Error: ${err.message}`, 'error');
            }
        }

        // ============================================================
        // AI ANALYSIS
        // ============================================================
        let lastImageFile = null;
        let lastAudioFile = null;

        async function analyzeWithAI() {
            showResult('Starting AI analysis...\nThis takes about 60-90 seconds.', 'info');

            try {
                // Get list of files to find most recent
                const imgRes = await fetch(`${getCameraURL()}/list/images`);
                const imgData = await imgRes.json();
                lastImageFile = imgData.files?.[0] || 'IMG_1.jpg';

                const audRes = await fetch(`${getCameraURL()}/list/audio`);
                const audData = await audRes.json();
                lastAudioFile = audData.files?.[0] || 'REC_1.wav';

                // Send to OpenAI
                const res = await fetch(`${getCameraURL()}/openai/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        images: [lastImageFile],
                        audio: lastAudioFile
                    })
                });
                const data = await res.json();

                if (data.status === 'processing') {
                    showResult('AI is processing...\nClick "Check Progress" to see status.', 'info');
                    // Auto-check progress
                    pollProgress();
                } else {
                    showResult(`Error: ${data.error}`, 'error');
                }
            } catch (err) {
                showResult(`Error: ${err.message}`, 'error');
            }
        }

        async function checkProgress() {
            try {
                const res = await fetch(`${getCameraURL()}/openai/progress`);
                const data = await res.json();

                if (data.resultReady) {
                    if (data.success) {
                        showResult(`AI Response:\n\n${data.response}`, 'success');
                    } else {
                        showResult(`AI Error: ${data.response}`, 'error');
                    }
                } else if (data.inProgress) {
                    showResult(`Progress: ${data.percent}%\n${data.stage}\n\n${data.detail || ''}`, 'info');
                } else {
                    showResult('No analysis in progress', 'info');
                }
            } catch (err) {
                showResult(`Error: ${err.message}`, 'error');
            }
        }

        function pollProgress() {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${getCameraURL()}/openai/progress`);
                    const data = await res.json();

                    if (data.resultReady) {
                        clearInterval(interval);
                        if (data.success) {
                            showResult(`AI Response:\n\n${data.response}`, 'success');
                        } else {
                            showResult(`AI Error: ${data.response}`, 'error');
                        }
                    } else if (data.inProgress) {
                        showResult(`Progress: ${data.percent}%\n${data.stage}\n\n${data.detail || ''}`, 'info');
                    }
                } catch (err) {
                    // Keep trying
                }
            }, 2000);

            // Stop after 2 minutes
            setTimeout(() => clearInterval(interval), 120000);
        }

        // ============================================================
        // YOUR CODE HERE!
        // ============================================================
        // Add your own functions below. Some ideas:
        //
        // - Take a photo every 5 minutes and analyze plant health
        // - Listen for a wake word and respond
        // - Create a photo booth that adds AI-generated captions
        // - Build a security camera that alerts on strangers
        //
        // The camera API endpoints are:
        //   GET  /capture          - Take a photo
        //   GET  /image/latest     - Get the latest photo
        //   GET  /audio/record?duration=5  - Record audio
        //   POST /openai/analyze   - Send image+audio to AI
        //   GET  /openai/progress  - Check AI analysis progress
        //   GET  /device-info      - Get camera IP, signal strength
        //   GET  /list/images      - List all saved images
        //   GET  /list/audio       - List all saved audio files
        //
    </script>
</body>
</html>
